<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rastrea tu envio | Zima</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root{
      --bg:#eef3f8;
      --text:#0f172a;
      --muted:#475569;
      --accent:#0f5f8f;
      --accent2:#1e87bd;
      --card:#ffffff;
      --border:rgba(2,6,23,.1);
    }
    body{
      margin:0;
      color:var(--text);
      background:
        radial-gradient(circle at 8% 8%, rgba(30,135,189,.15), transparent 30%),
        linear-gradient(180deg,#f8fbff 0%,var(--bg) 60%);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .top{
      background: linear-gradient(110deg, var(--accent), var(--accent2));
      color:#fff;
      box-shadow: 0 10px 24px rgba(15,95,143,.26);
    }
    .shell{ max-width: 980px; margin: 0 auto; }
    .card-soft{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      box-shadow:0 8px 20px rgba(2,6,23,.07);
    }
    .small-muted{ color:var(--muted); font-size:.92rem; }
    .status{
      font-size:.78rem;
      padding:.32rem .56rem;
      border-radius:999px;
      font-weight:700;
      display:inline-block;
    }
    .status-pend{ background:#facc15; color:#422006; }
    .status-trans{ background:#7dd3fc; color:#082f49; }
    .status-ent{ background:#6ee7b7; color:#064e3b; }
    .items-list li{ margin-bottom:.2rem; }
    .result-table th{ background:#f1f5f9; }
    .result-table td{ vertical-align:middle; }
  </style>
</head>
<body>
  <header class="top py-4 mb-4">
    <div class="shell px-3 d-flex flex-wrap justify-content-between align-items-center gap-2">
      <div>
        <div class="fw-bold fs-4"><i class="bi bi-truck me-1"></i> Rastrea tu envio</div>
        <div class="small">Consulta publica para clientes</div>
      </div>
      <span class="badge text-bg-light text-dark p-2"><i class="bi bi-shield-lock"></i> Modulo externo</span>
    </div>
  </header>

  <main class="shell px-3 pb-4">
    <section class="card-soft p-3 p-md-4 mb-3">
      <div class="row g-2 align-items-end">
        <div class="col-md-8">
          <label for="search-numero" class="form-label fw-semibold">Numero de guia</label>
          <input id="search-numero" class="form-control" placeholder="Ej: GUA-2026-07-3028" autocomplete="off" />
          <div class="small-muted mt-1">Ingresa tu numero de guia para ver estado y detalle.</div>
        </div>
        <div class="col-md-4 d-grid">
          <button class="btn btn-primary" id="btn-consultar"><i class="bi bi-search"></i> Consultar envio</button>
        </div>
      </div>
    </section>

    <section class="card-soft p-3 p-md-4 mb-3">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="mb-0">Resultados</h6>
        <span id="count" class="small-muted">0 registros</span>
      </div>
      <div id="api-status" class="small-muted mb-2"></div>
      <div class="table-responsive">
        <table class="table table-sm table-striped result-table mb-0">
          <thead>
            <tr>
              <th>Guia</th>
              <th>Estado</th>
              <th>Remitente</th>
              <th>Destinatario</th>
              <th>Fecha</th>
            </tr>
          </thead>
          <tbody id="body-results">
            <tr><td colspan="5" class="text-center py-4 small-muted">Sin resultados.</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="card-soft p-3 p-md-4" id="detail-box" style="display:none;">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="mb-0">Detalle del envio</h6>
        <span id="detail-status"></span>
      </div>
      <div class="row g-3">
        <div class="col-md-6"><strong>Guia:</strong> <span id="d-num">-</span></div>
        <div class="col-md-6"><strong>Fecha:</strong> <span id="d-fecha">-</span></div>
        <div class="col-md-6"><strong>Remitente:</strong> <span id="d-rem">-</span></div>
        <div class="col-md-6"><strong>Destinatario:</strong> <span id="d-dest">-</span></div>
        <div class="col-12"><strong>Direccion:</strong> <span id="d-dir">-</span></div>
        <div class="col-12"><strong>Observaciones:</strong> <span id="d-obs">-</span></div>
      </div>
      <hr>
      <div class="fw-semibold mb-2">Pedidos</div>
      <ul id="d-items" class="items-list mb-0"></ul>
    </section>
  </main>

  <script>
    (function(){
      'use strict';

      const API_URL = 'https://script.google.com/macros/s/AKfycbz3RFQTXT8tul6buwKGwhwqYPhOeo3zpKbT7BJueT6rro1H6WOVkBzsDJN9IWnGpHYS/exec';
      const API_HOJA = 'Tabla_1';
      const API_SPREADSHEET_ID = '1UCBIoFb0A4V9DnOQFoMVF58dubEfI54fLgpqeO_3X7I';
      const $ = (s) => document.querySelector(s);
      let currentRows = [];

      document.addEventListener('DOMContentLoaded', () => {
        $('#btn-consultar').addEventListener('click', onSearch);
        $('#search-numero').addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            onSearch();
          }
        });

        // Permite abrir con ?numero=GUA-XXXX
        const url = new URL(window.location.href);
        const prefill = (url.searchParams.get('numero') || '').trim();
        if (prefill) {
          $('#search-numero').value = prefill;
          onSearch();
        }
      });

      async function onSearch(){
        const term = String($('#search-numero').value || '').trim();
        if (!term) return alert('Escribe un numero de guia.');

        const url = buildApiUrl(term);
        setStatus('Consultando...');

        try {
          const payload = await fetchJson(url);
          applyRowsFromPayload(payload);
          return;
        } catch (fetchErr) {
          try {
            const payload = await fetchJsonp(url);
            applyRowsFromPayload(payload);
            return;
          } catch (jsonpErr) {
            setStatus('Error de conexion con el API.');
            alert(
              'No se pudo consultar el API.\n' +
              'Detalle fetch: ' + fetchErr.message + '\n' +
              'Detalle jsonp: ' + jsonpErr.message
            );
          }
        }
      }

      function applyRowsFromPayload(payload){
        if (payload && payload.ok === false) {
          currentRows = [];
          renderResults(currentRows);
          setStatus(payload.msg ? ('API: ' + payload.msg) : 'API respondio con error.');
          return;
        }

        const rows = Array.isArray(payload)
          ? payload
          : (Array.isArray(payload.data) ? payload.data : []);

        currentRows = rows.map((r, i) => normalizeRow(r, i + 1));
        renderResults(currentRows);
        setStatus(currentRows.length ? ('Consulta exitosa: ' + currentRows.length + ' registro(s).') : 'Consulta sin coincidencias.');

        if (currentRows.length === 1) renderDetail(currentRows[0]);
        if (!currentRows.length) $('#detail-box').style.display = 'none';
      }

      async function fetchJson(url){
        const res = await fetch(url, { method: 'GET' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
      }

      function fetchJsonp(url){
        return new Promise((resolve, reject) => {
          const cbName = '__zima_public_cb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
          const script = document.createElement('script');
          const sep = url.includes('?') ? '&' : '?';
          const src = url + sep + 'callback=' + cbName;
          let done = false;

          const cleanup = () => {
            if (script.parentNode) script.parentNode.removeChild(script);
            delete window[cbName];
          };

          const timeout = setTimeout(() => {
            if (done) return;
            done = true;
            cleanup();
            reject(new Error('Timeout JSONP'));
          }, 12000);

          window[cbName] = (data) => {
            if (done) return;
            done = true;
            clearTimeout(timeout);
            cleanup();
            resolve(data);
          };

          script.onerror = () => {
            if (done) return;
            done = true;
            clearTimeout(timeout);
            cleanup();
            reject(new Error('Fallo al cargar script JSONP'));
          };

          script.src = src;
          document.head.appendChild(script);
        });
      }

      function buildApiUrl(term){
        const params = new URLSearchParams();
        params.set('action', 'search');
        params.set('q', term);
        params.set('numero', term);
        params.set('hoja', API_HOJA);
        if (API_SPREADSHEET_ID) params.set('spreadsheetId', API_SPREADSHEET_ID);
        return API_URL + '?' + params.toString();
      }

      function normalizeRow(r, id){
        return {
          __id: id,
          numero: readAny(r, ['Numero','numero','N Guia','Guia']),
          estado: readAny(r, ['Estado','estado']),
          remitente: readAny(r, ['Remitente','remitente']),
          destinatario: readAny(r, ['Destinatario','destinatario']),
          direccion: readAny(r, ['Direccion','direccion','Dirección','Direccion entrega']),
          created_at: readAny(r, ['Fecha','fecha','Fecha emision','Fecha Emision']),
          obs: readAny(r, ['Observaciones','observaciones','Obs','obs']),
          pedidos: parsePedidos(readAny(r, ['Pedidos','pedidos','Detalle','detalle','Detalle contenido']))
        };
      }

      function readAny(obj, keys){
        if (!obj || typeof obj !== 'object') return '';
        const available = Object.keys(obj);
        for (const k of keys) {
          if (Object.prototype.hasOwnProperty.call(obj, k)) return String(obj[k] ?? '');
          const nk = normalizeKey(k);
          const found = available.find((a) => normalizeKey(a) === nk);
          if (found) return String(obj[found] ?? '');
        }
        return '';
      }

      function normalizeKey(v){
        return String(v || '')
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .toLowerCase()
          .trim();
      }

      function setStatus(msg){
        const el = $('#api-status');
        if (!el) return;
        el.textContent = msg || '';
      }

      function parsePedidos(raw){
        return String(raw || '')
          .split('|')
          .map(s => s.trim())
          .filter(Boolean)
          .map((txt) => ({ descripcion: txt, cantidad: 1, peso: '', valor: '' }));
      }

      function normalizeEstado(v=''){
        return String(v)
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .toLowerCase()
          .trim();
      }

      function estadoBadge(v=''){
        const n = normalizeEstado(v);
        if (n === 'pendiente') return '<span class="status status-pend">Pendiente</span>';
        if (n.includes('transito')) return '<span class="status status-trans">En transito</span>';
        if (n === 'entregado') return '<span class="status status-ent">Entregado</span>';
        return '<span class="status">' + escapeHtml(v || '-') + '</span>';
      }

      function fmtDate(v){
        if (!v) return '-';
        const d = new Date(v);
        if (Number.isNaN(d.getTime())) return String(v);
        return d.toLocaleString();
      }

      function escapeHtml(s=''){
        return String(s).replace(/[&<>\"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[c]));
      }

      function renderResults(rows){
        const body = $('#body-results');
        $('#count').innerText = rows.length + ' registros';

        if (!rows.length) {
          body.innerHTML = '<tr><td colspan="5" class="text-center py-4 small-muted">Sin resultados.</td></tr>';
          return;
        }

        body.innerHTML = rows.map(g => `
          <tr data-id="${g.__id}" style="cursor:pointer;">
            <td><strong>${escapeHtml(g.numero || '-')}</strong></td>
            <td>${estadoBadge(g.estado)}</td>
            <td>${escapeHtml(g.remitente || '-')}</td>
            <td>${escapeHtml(g.destinatario || '-')}</td>
            <td>${escapeHtml(fmtDate(g.created_at))}</td>
          </tr>
        `).join('');

        body.querySelectorAll('tr[data-id]').forEach((tr) => {
          tr.addEventListener('click', () => {
            const id = Number(tr.dataset.id);
            const row = currentRows.find(x => x.__id === id);
            if (row) renderDetail(row);
          });
        });
      }

      function renderDetail(g){
        $('#detail-box').style.display = 'block';
        $('#detail-status').innerHTML = estadoBadge(g.estado);
        $('#d-num').innerText = g.numero || '-';
        $('#d-fecha').innerText = fmtDate(g.created_at);
        $('#d-rem').innerText = g.remitente || '-';
        $('#d-dest').innerText = g.destinatario || '-';
        $('#d-dir').innerText = g.direccion || '-';
        $('#d-obs').innerText = g.obs || '-';

        const ul = $('#d-items');
        ul.innerHTML = '';
        if (!g.pedidos.length) {
          ul.innerHTML = '<li class="small-muted">Sin pedidos registrados.</li>';
          return;
        }

        g.pedidos.forEach((it, idx) => {
          const li = document.createElement('li');
          li.textContent = `${idx + 1}. ${it.descripcion || '-'}`;
          ul.appendChild(li);
        });
      }
    })();
  </script>
</body>
</html>
